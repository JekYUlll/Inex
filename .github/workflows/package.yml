name: Package release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  quality-gate:
    name: Required release quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install exact Rust quality toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install 1.97.0 --component clippy --component rustfmt
          rustup override set 1.97.0
      - name: Install exact release Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.14
      - name: Require the canonical release repository
        shell: bash
        run: test "$GITHUB_REPOSITORY" = "JekYUlll/Inex"
      - name: Bind tag and package versions
        shell: bash
        run: |
          arguments=()
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            arguments+=("--tag=$GITHUB_REF_NAME")
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "tag-triggered package workflow did not receive a tag ref" >&2
            exit 1
          fi
          python scripts/verify_release_tag.py "${arguments[@]}"
      - name: Verify Rust formatting
        run: cargo fmt --all -- --check
      - name: Test Rust workspace
        run: cargo test --workspace --all-targets --locked
      - name: Lint Rust workspace
        run: >-
          cargo clippy --workspace --all-targets --all-features --locked --
          -D warnings -W clippy::pedantic
      - name: Build warning-free Rust documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Test release tooling invariants
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: scripts
        run: python -m unittest discover -s scripts/tests -v
      - name: Install exact Sublime plugin Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.8.18
      - name: Test Sublime pure-Python client
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: editors/sublime
        run: python -W error::ResourceWarning -m unittest discover -s editors/sublime/tests -v
      - name: Reject source whitespace errors
        shell: bash
        run: |
          empty_tree=$(git hash-object -t tree /dev/null)
          git diff --check "$empty_tree" HEAD -- .

  package:
    name: Package ${{ matrix.platform }}
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
            extension_host: true
            vscode_platform: linux-x64
            native_gate: test
          - platform: windows-x64
            runner: windows-2025
            extension_host: false
            vscode_platform: win32-x64-archive
            native_gate: test
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            extension_host: false
            vscode_platform: linux-arm64
            native_gate: compile
          - platform: windows-arm64
            runner: windows-11-arm
            extension_host: false
            vscode_platform: win32-arm64-archive
            native_gate: compile
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Require a clean release source tree
        shell: bash
        run: test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Install exact native Rust toolchain
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install 1.97.0
          rustup override set 1.97.0
          rustc --version --verbose
      - name: Install exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
      - name: Install exact Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.14
      - name: Fetch hash-pinned libsodium MSVC inputs
        if: startsWith(matrix.platform, 'windows-')
        shell: bash
        run: python scripts/fetch_libsodium_dist.py target/libsodium-dist --github-env
      - name: Install exact pnpm
        shell: bash
        run: npm install --global pnpm@10.32.1
      - name: Populate locked dependency caches
        shell: bash
        run: |
          cargo fetch --locked
          pnpm --dir editors/vscode install --frozen-lockfile
          pnpm --dir packaging/vsce install --frozen-lockfile
      - name: Run release-bound native tests
        if: matrix.native_gate == 'test'
        shell: bash
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --workspace --all-targets --locked --offline
      - name: Compile release-bound native test targets
        if: matrix.native_gate == 'compile'
        shell: bash
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --workspace --all-targets --locked --offline --no-run
      - name: Build native release binaries offline
        shell: bash
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo build --workspace --release --locked --offline
      - name: Audit native dependencies with platform tools
        shell: bash
        run: >-
          python scripts/audit_native_dependencies.py
          --platform ${{ matrix.platform }}
          target/release/inex${{ startsWith(matrix.platform, 'windows-') && '.exe' || '' }}
          target/release/inexd${{ startsWith(matrix.platform, 'windows-') && '.exe' || '' }}
      - name: Verify and build extension from its lockfile
        shell: bash
        run: |
          pnpm --dir editors/vscode check
          pnpm --dir editors/vscode test
          pnpm --dir editors/vscode build
      - name: Prepare exact VS Code 1.125.0 host
        if: matrix.extension_host
        shell: bash
        run: |
          pnpm --dir editors/vscode test:extension:build
          xvfb-run -a node editors/vscode/test/runIntegration.mjs \
            --version=1.125.0 \
            --inex=target/release/inex \
            --inexd=target/release/inexd
      - name: Prepare exact platform VS Code CLI
        shell: bash
        working-directory: editors/vscode
        env:
          VSCODE_DOWNLOAD_PLATFORM: ${{ matrix.vscode_platform }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const {
            downloadAndUnzipVSCode,
            resolveCliPathFromVSCodeExecutablePath,
          } = require("@vscode/test-electron");

          (async () => {
            const platform = process.env.VSCODE_DOWNLOAD_PLATFORM;
            const executable = await downloadAndUnzipVSCode({
              version: "1.125.0",
              platform,
              cachePath: path.resolve(".vscode-test"),
            });
            const cli = resolveCliPathFromVSCodeExecutablePath(executable, platform);
            fs.writeFileSync(path.join(process.env.RUNNER_TEMP, "inex-vscode-cli.txt"), cli);
          })().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
          echo "VSCODE_CLI=$(cat "$RUNNER_TEMP/inex-vscode-cli.txt")" >> "$GITHUB_ENV"
      - name: Build curated platform artifacts
        shell: bash
        run: >-
          python scripts/package_release.py
          --platform ${{ matrix.platform }}
          --output-dir target/release-artifacts/${{ matrix.platform }}
      - name: Audit artifact contents and checksums
        shell: bash
        run: python scripts/audit_release_artifacts.py target/release-artifacts/${{ matrix.platform }}
      - name: Install platform VSIX and smoke all packaged executables
        shell: bash
        run: >-
          python scripts/smoke_release_artifacts.py
          target/release-artifacts/${{ matrix.platform }}
          --vscode-cli "$VSCODE_CLI"
      - name: Upload audited artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: inex-${{ matrix.platform }}
          path: target/release-artifacts/${{ matrix.platform }}/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
